name: Auto-retag UNTAGGED entries

# This workflow automatically fixes UNTAGGED entries and commits the changes
# Trigger manually via workflow_dispatch or on push to specific branches

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - dev
      - main

jobs:
  auto-retag:
    name: Automatically retag UNTAGGED entries
    runs-on: ubuntu-latest
    
    # Only run if there are UNTAGGED entries
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Check for UNTAGGED entries
      id: check
      run: |
        if grep -q '"UNTAGGED"' IdentityCore/src/telemetry/execution_flow/MSIDExecutionFlowTag.m; then
          echo "has_untagged=true" >> $GITHUB_OUTPUT
          echo "Found UNTAGGED entries"
        else
          echo "has_untagged=false" >> $GITHUB_OUTPUT
          echo "No UNTAGGED entries found"
        fi
    
    - name: Run retag script
      if: steps.check.outputs.has_untagged == 'true'
      run: python scripts/retag_untagged.py
    
    - name: Commit and push changes
      if: steps.check.outputs.has_untagged == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add IdentityCore/src/telemetry/execution_flow/MSIDExecutionFlowTag.m
        git commit -m "Auto-retag UNTAGGED execution flow tags"
        git push
      
    - name: No changes needed
      if: steps.check.outputs.has_untagged == 'false'
      run: echo "All tags are already assigned. No action needed."
