name: Validate Execution Flow Tags

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - dev
      - main

jobs:
  validate-tags:
    name: Check for UNTAGGED and duplicate tags
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Run tag validation
      run: python scripts/validate_tags.py
      
    - name: Show help message on failure
      if: failure()
      run: |
        echo "::error::Tag validation failed!"
        echo "::notice::To fix UNTAGGED entries, run: python scripts/retag_untagged.py"
        echo "::notice::To fix duplicate tags, manually edit IdentityCore/src/telemetry/execution_flow/MSIDExecutionFlowTag.m"
