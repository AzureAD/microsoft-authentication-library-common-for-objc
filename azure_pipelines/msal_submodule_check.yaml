# Pipeline will be triggered for PR & any updates on the PR on all branches
pr:
  branches:
    include:
    - '*'

# Trigger CI for only main/release branches
trigger:
  branches:
    include:
    - main
    - release/*

resources:
 repositories:
   - repository: microsoft-authentication-library-for-objc
     type: github
     endpoint: 'MSAL ObjC Service Connection'
     name: AzureAD/microsoft-authentication-library-for-objc

# Define parallel jobs that run build script for specified targets
jobs:
- job: 'Validate_Pull_Request'
  strategy:
    maxParallel: 3
    matrix:
      IOS_FRAMEWORK:
        target: "iosFramework iosTestApp sampleIosApp sampleIosAppSwift"
      MAC_FRAMEWORK:
        target: "macFramework"
      VISION_FRAMEWORK:
        target: "visionOSFramework"
  displayName: Validate Pull Request
  pool:
    vmImage: 'macOS-14'
    timeOutInMinutes: 30

  steps:
  - script: |
          /bin/bash -c "sudo xcode-select -s /Applications/Xcode_16.2.app"
    displayName: 'Switch to use Xcode 16.2'
  - task: CmdLine@2
    displayName: Uninstalling xcpretty v0.4.0
    inputs:
      script: |
        gem uninstall xcpretty -I --version 0.4.0
      failOnStderr: false
  - task: CmdLine@2
    displayName: Installing xcpretty v0.3.0
    inputs:
      script: |
        gem install xcpretty -N -v 0.3.0
      failOnStderr: true
  - task: CmdLine@2
    displayName: Installing dependencies
    inputs:
      script: |
        gem install slather bundler -N
      failOnStderr: true

# The following is needed to install the visionOS SDK on macos-14 vm image which
# doesn't have visionOS installed by default.
# TODO: Remove when macos-14-arm64 is supported on ADO.
  - task: Bash@3
    displayName: download visionOS SDK
    inputs:
      targetType: 'inline'
      script: |
        echo $(target)
        if [ $(target) == 'visionOSFramework' ]; then
            echo "=== Setting up visionOS SDK ==="

            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
            echo "Active developer directory: $(xcode-select -p)"

            echo "Setting visionOS preferences..."
            defaults write com.apple.dt.Xcode AllowUnsupportedVisionOSHost -bool YES
            defaults write com.apple.CoreSimulator AllowUnsupportedVisionOSHost -bool YES

            echo "Downloading visionOS platform..."
            MAX_RETRIES=3
            RETRY_DELAY=15
            for attempt in $(seq 1 $MAX_RETRIES); do
                echo "Download attempt $attempt of $MAX_RETRIES..."
                if xcodebuild -downloadPlatform visionOS; then
                    echo "Download succeeded on attempt $attempt."
                    break
                else
                    echo "Download attempt $attempt failed."
                    if [ $attempt -lt $MAX_RETRIES ]; then
                        echo "Retrying in $RETRY_DELAY seconds..."
                        # Kill simulator service before retrying to clear stale connections
                        sudo killall -9 com.apple.CoreSimulator.CoreSimulatorService 2>/dev/null || true
                        sleep $RETRY_DELAY
                    else
                        echo "All $MAX_RETRIES attempts failed." >&2
                        exit 1
                    fi
                fi
            done

            # Wait for platform installation to complete
            echo "Waiting for platform installation to complete..."
            sleep 10

            # Refresh simulator service
            echo "Refreshing CoreSimulator service..."
            sudo killall -9 com.apple.CoreSimulator.CoreSimulatorService 2>/dev/null || true
            sleep 5

            # Force refresh of available SDKs and runtimes
            echo "Refreshing available SDKs and runtimes..."
            xcrun simctl list devices > /dev/null 2>&1 || true

            echo "=== Post-download verification ==="
            echo "Available SDKs after download:"
            xcodebuild -showsdks

            echo "VisionOS specific check:"
            xcodebuild -showsdks | grep -i vision || echo "WARNING: VisionOS SDK not found after download"
        else
            echo "Not visionOS job, no download needed"
        fi
      failOnStderr: false

  - checkout: microsoft-authentication-library-for-objc
    displayName: 'Checkout MSAL'
    clean: true
    submodules: true
    fetchTags: true
    persistCredentials: true

  - checkout: self
    clean: true
    submodules: false
    fetchDepth: 1
    path: 's/microsoft-authentication-library-for-objc/MSAL/IdentityCore'
    persistCredentials: false

  - task: Bash@3
    displayName: Run Build script & check for Errors
    inputs:
      targetType: 'inline'
      script: |
        cd $(Agent.BuildDirectory)/s/microsoft-authentication-library-for-objc
        { output=$(./build.py --target $(target) 2>&1 1>&3-) ;} 3>&1
        final_status=$(<./build/status.txt)
        echo "FINAL STATUS  = ${final_status}"
        echo "POSSIBLE ERRORS: ${output}"
        
        if [ $final_status != "0" ]; then
          echo "Build & Testing Failed! \n ${output}" >&2
        fi
      failOnStderr: true
  - task: Bash@3
    condition: always()
    displayName: Cleanup
    inputs:
      targetType: 'inline'
      script: |
        rm -rf $(Agent.BuildDirectory)/s/build/status.txt
        
  - task: PublishTestResults@2
    condition: always()
    displayName: Publish Test Report
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(Agent.BuildDirectory)/s/build/reports/*'
      failTaskOnFailedTests: true
      testRunTitle: 'Test Run - $(target)'
