# Pipeline will be triggered for PR & any updates on the PR on all branches
#
# To manually trigger this pipeline from a pull request comment, post:
#   /azp run MSAL Submodule Check
# (replace "MSAL Submodule Check" with the actual name of this pipeline in Azure DevOps)

pr:
  autoCancel: true
  branches:
    include:
    - '*'
  drafts: true

# Trigger CI for only main/release branches
trigger:
  branches:
    include:
    - main
    - release/*

# Pipeline parameter: supply the branch of microsoft-authentication-library-for-objc to validate against.
# Defaults to 'dev'. Can be overridden when manually queuing the pipeline or via /azp run.
parameters:
- name: msalBranch
  displayName: 'MSAL for ObjC branch'
  type: string
  default: 'dev'

resources:
 repositories:
   - repository: microsoft-authentication-library-for-objc
     type: github
     endpoint: 'MSAL ObjC Service Connection'
     name: AzureAD/microsoft-authentication-library-for-objc
     ref: refs/heads/${{ parameters.msalBranch }}

# Define parallel jobs that run build script for specified targets
jobs:
- job: 'Validate_Pull_Request'
  timeoutInMinutes: 30
  strategy:
    maxParallel: 2
    matrix:
      IOS_FRAMEWORK:
        target: "iosFramework iosTestApp sampleIosApp sampleIosAppSwift"
      MAC_FRAMEWORK:
        target: "macFramework"
  displayName: Validate Pull Request
  pool:
    vmImage: 'macOS-14'

  steps:
  - script: |
          /bin/bash -c "sudo xcode-select -s /Applications/Xcode_16.2.app"
    displayName: 'Switch to use Xcode 16.2'
  - task: CmdLine@2
    displayName: Uninstalling xcpretty v0.4.0
    inputs:
      script: |
        gem uninstall xcpretty -I --version 0.4.0
      failOnStderr: false
  - task: CmdLine@2
    displayName: Installing xcpretty v0.3.0
    inputs:
      script: |
        gem install xcpretty -N -v 0.3.0
      failOnStderr: true
  - task: CmdLine@2
    displayName: Installing dependencies
    inputs:
      script: |
        gem install slather bundler -N
      failOnStderr: true

  - checkout: microsoft-authentication-library-for-objc
    displayName: 'Checkout MSAL'
    clean: true
    submodules: true
    fetchTags: true
    persistCredentials: true

  - checkout: self
    clean: true
    submodules: false
    fetchDepth: 1
    path: 's/microsoft-authentication-library-for-objc/MSAL/IdentityCore'
    persistCredentials: false

  - task: Bash@3
    displayName: Run Build script & check for Errors
    inputs:
      targetType: 'inline'
      script: |
        cd $(Agent.BuildDirectory)/s/microsoft-authentication-library-for-objc
        { output=$(./build.py --target $(target) 2>&1 1>&3-) ;} 3>&1
        final_status=$(<./build/status.txt)
        echo "FINAL STATUS  = ${final_status}"
        echo "POSSIBLE ERRORS: ${output}"
        
        if [ $final_status != "0" ]; then
          echo "Build & Testing Failed! \n ${output}" >&2
        fi
      failOnStderr: true
  - task: Bash@3
    condition: always()
    displayName: Cleanup
    inputs:
      targetType: 'inline'
      script: |
        rm -rf $(Agent.BuildDirectory)/s/build/status.txt
        
  - task: PublishTestResults@2
    condition: always()
    displayName: Publish Test Report
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(Agent.BuildDirectory)/s/build/reports/*'
      failTaskOnFailedTests: true
      testRunTitle: 'Test Run - $(target)'
