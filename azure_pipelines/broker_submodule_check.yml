# Pipeline will be triggered for PR & any updates on the PR on all branches
#
# To manually trigger this pipeline from a pull request comment, post:
#   /azp run [Broker] Common core submodule check v2
# To specify a branch (e.g., main), queue the pipeline via the Azure DevOps UI and set brokerBranch=main

trigger:
  branches:
    include:
    - dev

pr:
  autoCancel: true
  branches:
    include:
    - '*'
  drafts: true

# Pipeline parameter: supply the branch of azure-activedirectory-tokenbroker-for-objc to validate against.
# Defaults to 'dev'. Can be overridden when manually queuing the pipeline or via /azp run.
parameters:
- name: brokerBranch
  displayName: 'Broker for ObjC branch'
  type: string
  default: 'dev'

resources:
 repositories:
   - repository: azure-activedirectory-tokenbroker-for-objc
     type: github
     endpoint: 'MSAL ObjC Service Connection'
     name: AzureAD/azure-activedirectory-tokenbroker-for-objc
     ref: refs/heads/${{ parameters.brokerBranch }}

   - repository: WorkplaceJoin-for-iOS
     type: github
     endpoint: 'MSAL ObjC Service Connection'
     name: AzureAD/WorkplaceJoin-for-iOS

   # Shared ACES macOS job template (pool + Xcode + tool setup) — source of truth.
   # TODO: switch ref to 'main' once ameyapat/common-aces-config is merged.
   - repository: pipelinesShared
     type: git
     name: IDDP/MSAL-ObjC-Pipelines
     ref: refs/heads/ameyapat/common-aces-config

stages:
- stage: Stage_IOS
  displayName: "Validate iOS"
  dependsOn: []
  jobs:
  - template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
    parameters:
      jobName: Validate_Pull_Request_IOS
      displayName: Validate Pull Request (iOS)
      # 0 = use the maximum limit allowed by the pool.
      timeoutInMinutes: 0
      steps:
        - template: /azure_pipelines/broker_build_steps.yml
          parameters:
            target: ios_library

- stage: Stage_MAC
  displayName: "Validate Mac"
  dependsOn: []
  jobs:
  - template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
    parameters:
      jobName: Validate_Pull_Request_MAC
      displayName: Validate Pull Request (Mac)
      # 0 = use the maximum limit allowed by the pool.
      timeoutInMinutes: 0
      steps:
        - template: /azure_pipelines/broker_build_steps.yml
          parameters:
            target: mac_library
        
