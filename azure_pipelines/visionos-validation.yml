# Consolidated visionOS validation pipeline
# This pipeline runs all visionOS checks for IdentityCore, MSAL, and Broker in one place.
#
# Pool + Xcode + Ruby/Python tooling are provided by the shared governed ACES macOS
# job template (Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared). Each stage
# supplies only its own build steps via the template's `steps` parameter, so the pool,
# image and Xcode version are inherited from that single source of truth.

trigger:
  branches:
    include:
    - dev
    - main
    - release/*

resources:
  repositories:
  - repository: microsoft-authentication-library-for-objc
    type: github
    endpoint: 'MSAL ObjC Service Connection'
    name: AzureAD/microsoft-authentication-library-for-objc

  - repository: azure-activedirectory-tokenbroker-for-objc
    type: github
    endpoint: 'MSAL ObjC Service Connection'
    name: AzureAD/azure-activedirectory-tokenbroker-for-objc

  - repository: WorkplaceJoin-for-iOS
    type: github
    endpoint: 'MSAL ObjC Service Connection'
    name: AzureAD/WorkplaceJoin-for-iOS

  # Shared ACES macOS job template (pool + Xcode + tool setup) — source of truth.
  # TODO: switch ref to 'main' once ameyapat/common-aces-config is merged.
  - repository: pipelinesShared
    type: git
    name: IDDP/MSAL-ObjC-Pipelines
    ref: refs/heads/main

stages:
# Stage 1: IdentityCore visionOS validation
- stage: Stage_IdentityCore_VisionOS
  displayName: "IdentityCore visionOS"
  dependsOn: []
  jobs:
  - template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
    parameters:
      jobName: Validate_IdentityCore_VisionOS
      displayName: IdentityCore vision_library
      timeoutInMinutes: 60
      steps:
      - checkout: self
        clean: true
        submodules: true
        fetchDepth: 1
        persistCredentials: false
      - task: Bash@3
        displayName: Removing any lingering codecov files
        inputs:
          targetType: 'inline'
          script: |
            find . -name "*.gcda" -print0 | xargs -0 rm
      - template: /azure_pipelines/templates/download-visionos-sdk.yml
      - task: Bash@3
        displayName: Run CPP script
        inputs:
          targetType: 'inline'
          script: |
            python3 ./scripts/update_xcode_config_cpp_checks.py
          failOnStderr: true
      - task: Bash@3
        displayName: Run Build script & check for Errors
        inputs:
          targetType: 'inline'
          script: |
            { output=$(./build.py --no-clean --show-build-settings --target vision_library 2>&1 1>&3-) ;} 3>&1
            final_status=$(<./build/status.txt)
            echo "FINAL STATUS  = ${final_status}"
            echo "POSSIBLE ERRORS: ${output}"

            if [ $final_status != "0" ]; then
              echo "Build & Testing Failed! \n ${output}" >&2
            fi
          failOnStderr: true
      - task: Bash@3
        condition: always()
        displayName: Cleanup
        inputs:
          targetType: 'inline'
          script: |
            rm -rf ./build/status.txt
      - task: PublishTestResults@2
        condition: always()
        displayName: Publish Test Report
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '$(Agent.BuildDirectory)/s/build/reports/*'
          failTaskOnFailedTests: true
          testRunTitle: 'Test Run - IdentityCore visionOS'

# Stage 2: MSAL visionOS Framework validation
- stage: Stage_MSAL_VisionOS
  displayName: "MSAL visionOS"
  dependsOn: []
  jobs:
  - template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
    parameters:
      jobName: Validate_MSAL_VisionOS
      displayName: MSAL visionOSFramework
      timeoutInMinutes: 60
      steps:
      - template: /azure_pipelines/templates/download-visionos-sdk.yml
      - checkout: microsoft-authentication-library-for-objc
        displayName: 'Checkout MSAL'
        clean: true
        submodules: true
        fetchTags: true
        persistCredentials: true
      - checkout: self
        clean: true
        submodules: false
        fetchDepth: 1
        path: 's/microsoft-authentication-library-for-objc/MSAL/IdentityCore'
        persistCredentials: false
      - task: Bash@3
        displayName: Run Build script & check for Errors
        inputs:
          targetType: 'inline'
          script: |
            cd $(Agent.BuildDirectory)/s/microsoft-authentication-library-for-objc
            { output=$(./build.py --target visionOSFramework 2>&1 1>&3-) ;} 3>&1
            final_status=$(<./build/status.txt)
            echo "FINAL STATUS  = ${final_status}"
            echo "POSSIBLE ERRORS: ${output}"

            if [ $final_status != "0" ]; then
              echo "Build & Testing Failed! \n ${output}" >&2
            fi
          failOnStderr: true
      - task: Bash@3
        condition: always()
        displayName: Cleanup
        inputs:
          targetType: 'inline'
          script: |
            rm -rf $(Agent.BuildDirectory)/s/build/status.txt
      - task: PublishTestResults@2
        condition: always()
        displayName: Publish Test Report
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '$(Agent.BuildDirectory)/s/build/reports/*'
          failTaskOnFailedTests: true
          testRunTitle: 'Test Run - MSAL visionOS'

# Stage 3: Broker visionOS validation
- stage: Stage_Broker_VisionOS
  displayName: "Broker visionOS"
  dependsOn: []
  jobs:
  - template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
    parameters:
      jobName: Validate_Broker_VisionOS
      displayName: Broker vision_library
      timeoutInMinutes: 60
      steps:
      - template: /azure_pipelines/templates/download-visionos-sdk.yml
      # Repo checkouts, submodules and build. Xcode is inherited from the shared
      # ACES job template, so selectLocalXcode is false.
      - template: /azure_pipelines/broker_build_steps.yml
        parameters:
          target: vision_library
          selectLocalXcode: false
