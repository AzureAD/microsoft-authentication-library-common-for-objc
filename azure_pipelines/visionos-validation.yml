# Consolidated visionOS validation pipeline
# This pipeline runs all visionOS checks for IdentityCore, MSAL, and Broker in one place.

pr:
  autoCancel: true
  branches:
    include:
    - '*'
  drafts: true

trigger:
  branches:
    include:
    - dev
    - main
    - release/*

pool:
  name: 'Azure Pipelines'

resources:
  repositories:
    - repository: microsoft-authentication-library-for-objc
      type: github
      endpoint: 'MSAL ObjC Service Connection'
      name: AzureAD/microsoft-authentication-library-for-objc

    - repository: azure-activedirectory-tokenbroker-for-objc
      type: github
      endpoint: 'MSAL ObjC Service Connection'
      name: AzureAD/azure-activedirectory-tokenbroker-for-objc

    - repository: WorkplaceJoin-for-iOS
      type: github
      endpoint: 'MSAL ObjC Service Connection'
      name: AzureAD/WorkplaceJoin-for-iOS

stages:
# Stage 1: IdentityCore visionOS validation
- stage: Stage_IdentityCore_VisionOS
  displayName: "IdentityCore visionOS"
  dependsOn: []
  jobs:
  - job: Validate_IdentityCore_VisionOS
    displayName: IdentityCore vision_library
    timeoutInMinutes: 60
    pool:
      vmImage: 'macOS-15'
    steps:
    - task: CmdLine@2
      displayName: Uninstalling xcpretty v0.4.0
      inputs:
        script: |
          gem uninstall xcpretty -I --version 0.4.0
        failOnStderr: false
    - task: CmdLine@2
      displayName: Installing xcpretty v0.3.0
      inputs:
        script: |
          gem install xcpretty -N -v 0.3.0
        failOnStderr: true
    - task: CmdLine@2
      displayName: Installing slather
      inputs:
        script: |
          gem install slather -N
        failOnStderr: true
    - checkout: self
      clean: true
      submodules: true
      fetchDepth: 1
      persistCredentials: false
    - task: Bash@3
      displayName: 'Select Xcode version'
      inputs:
        targetType: 'inline'
        script: '/bin/bash -c "sudo xcode-select -s /Applications/Xcode_16.2.app"'
    - task: Bash@3
      displayName: Removing any lingering codecov files
      inputs:
        targetType: 'inline'
        script: |
          find . -name "*.gcda" -print0 | xargs -0 rm
    - task: Bash@3
      displayName: Download visionOS SDK
      inputs:
        targetType: 'inline'
        script: |
          echo "Downloading simulator for visionOS"
          defaults write com.apple.dt.Xcode AllowUnsupportedVisionOSHost -bool YES
          defaults write com.apple.CoreSimulator AllowUnsupportedVisionOSHost -bool YES
          xcodebuild -downloadPlatform visionOS
        failOnStderr: false
    - task: Bash@3
      displayName: Run CPP script
      inputs:
        targetType: 'inline'
        script: |
          python ./scripts/update_xcode_config_cpp_checks.py
        failOnStderr: true
    - task: Bash@3
      displayName: Run Build script & check for Errors
      inputs:
        targetType: 'inline'
        script: |
          { output=$(./build.py --no-clean --show-build-settings --target vision_library 2>&1 1>&3-) ;} 3>&1
          final_status=$(<./build/status.txt)
          echo "FINAL STATUS  = ${final_status}"
          echo "POSSIBLE ERRORS: ${output}"
          
          if [ $final_status != "0" ]; then
            echo "Build & Testing Failed! \n ${output}" >&2
          fi
        failOnStderr: true
    - task: Bash@3
      condition: always()
      displayName: Cleanup
      inputs:
        targetType: 'inline'
        script: |
          rm -rf ./build/status.txt
    - task: PublishTestResults@2
      condition: always()
      displayName: Publish Test Report
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Agent.BuildDirectory)/s/build/reports/*'
        failTaskOnFailedTests: true
        testRunTitle: 'Test Run - IdentityCore visionOS'

# Stage 2: MSAL visionOS Framework validation
- stage: Stage_MSAL_VisionOS
  displayName: "MSAL visionOS"
  dependsOn: []
  jobs:
  - job: Validate_MSAL_VisionOS
    displayName: MSAL visionOSFramework
    timeoutInMinutes: 60
    pool:
      vmImage: 'macOS-14'
    steps:
    - script: |
        /bin/bash -c "sudo xcode-select -s /Applications/Xcode_16.2.app"
      displayName: 'Switch to use Xcode 16.2'
    - task: CmdLine@2
      displayName: Uninstalling xcpretty v0.4.0
      inputs:
        script: |
          gem uninstall xcpretty -I --version 0.4.0
        failOnStderr: false
    - task: CmdLine@2
      displayName: Installing xcpretty v0.3.0
      inputs:
        script: |
          gem install xcpretty -N -v 0.3.0
        failOnStderr: true
    - task: CmdLine@2
      displayName: Installing dependencies
      inputs:
        script: |
          gem install slather bundler -N
        failOnStderr: true
    - task: Bash@3
      displayName: Download visionOS SDK
      inputs:
        targetType: 'inline'
        script: |
          echo "Downloading simulator for visionOS"
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          defaults write com.apple.dt.Xcode AllowUnsupportedVisionOSHost -bool YES
          defaults write com.apple.CoreSimulator AllowUnsupportedVisionOSHost -bool YES
          xcodebuild -downloadPlatform visionOS
        failOnStderr: false
    - checkout: microsoft-authentication-library-for-objc
      displayName: 'Checkout MSAL'
      clean: true
      submodules: true
      fetchTags: true
      persistCredentials: true
    - checkout: self
      clean: true
      submodules: false
      fetchDepth: 1
      path: 's/microsoft-authentication-library-for-objc/MSAL/IdentityCore'
      persistCredentials: false
    - task: Bash@3
      displayName: Run Build script & check for Errors
      inputs:
        targetType: 'inline'
        script: |
          cd $(Agent.BuildDirectory)/s/microsoft-authentication-library-for-objc
          { output=$(./build.py --target visionOSFramework 2>&1 1>&3-) ;} 3>&1
          final_status=$(<./build/status.txt)
          echo "FINAL STATUS  = ${final_status}"
          echo "POSSIBLE ERRORS: ${output}"
          
          if [ $final_status != "0" ]; then
            echo "Build & Testing Failed! \n ${output}" >&2
          fi
        failOnStderr: true
    - task: Bash@3
      condition: always()
      displayName: Cleanup
      inputs:
        targetType: 'inline'
        script: |
          rm -rf $(Agent.BuildDirectory)/s/build/status.txt
    - task: PublishTestResults@2
      condition: always()
      displayName: Publish Test Report
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Agent.BuildDirectory)/s/build/reports/*'
        failTaskOnFailedTests: true
        testRunTitle: 'Test Run - MSAL visionOS'

# Stage 3: Broker visionOS validation
- stage: Stage_Broker_VisionOS
  displayName: "Broker visionOS"
  dependsOn: []
  jobs:
  - job: Validate_Broker_VisionOS
    displayName: Broker vision_library
    timeoutInMinutes: 60
    pool:
      vmImage: 'macOS-15'
    variables:
      target: "vision_library"
    steps:
    - template: broker_submodule_steps.yml
