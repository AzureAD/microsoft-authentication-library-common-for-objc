# Pipeline will be triggered for PR & any updates on the PR on all branches 

pr:
  autoCancel: true
  branches:
    include:
    - '*'
  drafts: true

# Not triggering for CI since it is triggered for PRs 
trigger: none

resources:
  repositories:
    - repository: automationHealthTracker
      type: git
      name: IDDP/MSAL-ObjC-Pipelines
      ref: main
    # Shared ACES macOS job template (pool + Xcode + tool setup) — source of truth.
    # TODO: switch ref to 'main' once ameyapat/common-aces-config is merged.
    - repository: pipelinesShared
      type: git
      name: IDDP/MSAL-ObjC-Pipelines
      ref: refs/heads/josephpab/xcbeautify-and-shared-step-templates

# Define parallel jobs that run build script for specified targets
jobs:
- job: DetectAutomationHealthChanges
  pool: { vmImage: 'ubuntu-latest' }
  displayName: Detect automation health changes
  steps:
    - checkout: self
      clean: true
      fetchDepth: 0
      persistCredentials: true
    - task: Bash@3
      name: detectChanges
      displayName: Detect non-test changes
      inputs:
        targetType: 'inline'
        script: |
          set -euo pipefail

          target_branch_ref="$(System.PullRequest.TargetBranch)"
          if [[ "${target_branch_ref}" != refs/* ]]; then
            target_branch_ref="refs/heads/${target_branch_ref}"
          fi

          # Fail open: if change detection can't run, default to running AutomationHealth.
          run_automation_health=true
          if git fetch --no-tags origin "+${target_branch_ref}:refs/remotes/origin/pr-target"; then
            run_automation_health=false

            changed_files="$(git diff --name-only refs/remotes/origin/pr-target...HEAD)" || {
              run_automation_health=true
              changed_files=""
            }

            while IFS= read -r changed_file
            do
              case "$changed_file" in
                ""|IdentityCore/tests/*)
                  ;;
                *)
                  run_automation_health=true
                  break
                  ;;
              esac
            done <<< "${changed_files}"
          fi

          echo "##vso[task.setvariable variable=runAutomationHealth;isOutput=true]${run_automation_health}"
- job: AutomationHealth
  dependsOn: DetectAutomationHealthChanges
  condition: and(succeeded(), eq(dependencies.DetectAutomationHealthChanges.outputs['detectChanges.runAutomationHealth'], 'true'))
  pool: { vmImage: 'ubuntu-latest' }
  displayName: Automation pipeline health check
  steps:
    - template: Pipeline YAMLs/automation-health-tracker.yml@automationHealthTracker
      parameters:
        automationPipelineIds: [1956, 1284]

- template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
  parameters:
    jobName: Validate_Pull_Request_iOS
    displayName: Validate Pull Request (iOS)
    timeoutInMinutes: 30
    steps:
      - checkout: self
        clean: true
        submodules: true
        fetchDepth: 1
        persistCredentials: false
      - task: Bash@3
        displayName: Removing any lingering codecov files. These can cause issues when the xcode version changes
        inputs:
          targetType: 'inline'
          script: |
            find . -name "*.gcda" -print0 | xargs -0 rm
      - task: Bash@3
        displayName: Run CPP script
        inputs:
          targetType: 'inline'
          script: |
            python3 ./scripts/update_xcode_config_cpp_checks.py
          failOnStderr: true
      # TEST WIRING (revert with the ref flip): exercise the shared
      # steps-buildpy-validate.yml template (build.py exit propagation +
      # status cleanup + JUnit publish) in place of the inline block.
      - template: Pipeline YAMLs/shared/steps-buildpy-validate.yml@pipelinesShared
        parameters:
          target: ios_library
          testRunTitle: 'Test Run - ios_library'
          extraBuildArgs: '--no-clean --show-build-settings'
          cleanCodecov: false

- template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
  parameters:
    jobName: Validate_Pull_Request_macOS
    displayName: Validate Pull Request (macOS)
    timeoutInMinutes: 30
    steps:
      - checkout: self
        clean: true
        submodules: true
        fetchDepth: 1
        persistCredentials: false
      - task: Bash@3
        displayName: Removing any lingering codecov files. These can cause issues when the xcode version changes
        inputs:
          targetType: 'inline'
          script: |
            find . -name "*.gcda" -print0 | xargs -0 rm
      - task: Bash@3
        displayName: Run CPP script
        inputs:
          targetType: 'inline'
          script: |
            python3 ./scripts/update_xcode_config_cpp_checks.py
          failOnStderr: true
      # TEST WIRING (revert with the ref flip): exercise the shared
      # steps-buildpy-validate.yml template (build.py exit propagation +
      # status cleanup + JUnit publish) in place of the inline block.
      - template: Pipeline YAMLs/shared/steps-buildpy-validate.yml@pipelinesShared
        parameters:
          target: mac_library
          testRunTitle: 'Test Run - mac_library'
          extraBuildArgs: '--no-clean --show-build-settings'
          cleanCodecov: false
  
