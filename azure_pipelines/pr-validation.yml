# Pipeline will be triggered for PR & any updates on the PR on all branches 

pr:
  autoCancel: true
  branches:
    include:
    - '*'
  drafts: true

# Not triggering for CI since it is triggered for PRs 
trigger: none

resources:
  repositories:
    - repository: automationHealthTracker
      type: git
      name: IDDP/MSAL-ObjC-Pipelines
      ref: main

# Define parallel jobs that run build script for specified targets
jobs:
- job: DetectAutomationHealthChanges
  pool: { vmImage: 'ubuntu-latest' }
  displayName: Detect automation health changes
  steps:
    - checkout: self
      clean: true
      fetchDepth: 0
      persistCredentials: true
    - task: Bash@3
      name: detectChanges
      displayName: Detect non-test changes
      inputs:
        targetType: 'inline'
        script: |
          set -euo pipefail

          target_branch_ref="$(System.PullRequest.TargetBranch)"
          if [[ "${target_branch_ref}" != refs/* ]]; then
            target_branch_ref="refs/heads/${target_branch_ref}"
          fi

          git fetch --no-tags origin "+${target_branch_ref}:refs/remotes/origin/pr-target"

          run_automation_health=false
          while IFS= read -r changed_file
          do
            case "$changed_file" in
              ""|IdentityCore/tests/*)
                ;;
              *)
                run_automation_health=true
                break
                ;;
            esac
          done < <(git diff --name-only refs/remotes/origin/pr-target...HEAD)

          echo "##vso[task.setvariable variable=runAutomationHealth;isOutput=true]${run_automation_health}"
- job: AutomationHealth
  dependsOn: DetectAutomationHealthChanges
  condition: and(succeeded(), eq(dependencies.DetectAutomationHealthChanges.outputs['detectChanges.runAutomationHealth'], 'true'))
  pool: { vmImage: 'ubuntu-latest' }
  displayName: Automation pipeline health check
  steps:
    - template: Pipeline YAMLs/automation-health-tracker.yml@automationHealthTracker
      parameters:
        automationPipelineIds: [1956, 1284]
- job: 'Validate_Pull_Request'
  strategy:
    maxParallel: 2
    matrix:
      IOS_LIB: 
        target: "ios_library"
      MAC_LIB: 
        target: "mac_library"
  displayName: Validate Pull Request
  pool:
    name: 'AcesShared'
    demands:
      - ImageOverride -equals ACES_VM_SharedPool_Sequoia
    timeOutInMinutes: 30

  steps:
  - task: CmdLine@2
    displayName: Uninstalling xcpretty v0.4.0
    inputs:
      script: |
        sudo gem uninstall xcpretty -I --version 0.4.0
      failOnStderr: false
  - task: CmdLine@2
    displayName: Installing xcpretty v0.3.0
    inputs:
      script: |
        sudo gem install xcpretty -N -v 0.3.0
      failOnStderr: true
  - script: |
      # System Ruby on macOS agents is 2.6, too old for current slather/bundler.
      # Install a modern Ruby via Homebrew and prepend it to PATH for all subsequent steps.
      export HOMEBREW_NO_AUTO_UPDATE=1
      export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
      brew list ruby >/dev/null 2>&1 || brew install ruby
      RUBY_BIN="$(brew --prefix ruby)/bin"
      echo "##vso[task.prependpath]$GEM_HOME/bin"
      echo "##vso[task.prependpath]$RUBY_BIN"
      "$RUBY_BIN/ruby" --version
    displayName: 'Install modern Ruby'
  - task: CmdLine@2
    displayName: Installing slather
    inputs:
      script: |
        gem install slather bundler -N
      failOnStderr: true
  - checkout: self
    clean: true
    submodules: true
    fetchDepth: 1
    persistCredentials: false
  - task: UsePythonVersion@0
    displayName: 'Use Python 3.x'
    inputs:
      versionSpec: '3.x'
  - task: Bash@3
    displayName: 'Harden Python toolcache permissions (silence Ruby insecure PATH warning)'
    inputs:
      targetType: 'inline'
      script: |
        # /opt/hostedtoolcache/Python is created world-writable (mode 0777),
        # which makes Ruby (used by xcpretty/slather) emit a warning to stderr
        # whenever it loads rbconfig.rb. That warning trips `failOnStderr: true`
        # on later steps. Strip the world-write bit from the toolcache tree.
        if [ -d /opt/hostedtoolcache ]; then
          sudo chmod -R o-w /opt/hostedtoolcache || true
        fi
      failOnStderr: false
  - task: Bash@3
    displayName: 'Select Xcode version'
    inputs:
      targetType: 'inline'
      script: '/bin/bash -c "sudo xcode-select -s /Applications/Xcode_16.4.app"'
  - task: Bash@3
    displayName: Removing any lingering codecov files. These can cause issues when the xcode version changes
    inputs:
      targetType: 'inline'
      script: |
        find . -name "*.gcda" -print0 | xargs -0 rm
  - task: Bash@3
    displayName: Run CPP script
    inputs:
      targetType: 'inline'
      script: |
        python3 ./scripts/update_xcode_config_cpp_checks.py
      failOnStderr: true
  - task: Bash@3
    displayName: Run Build script & check for Errors
    inputs:
      targetType: 'inline'
      script: |
        { output=$(./build.py --no-clean --show-build-settings --target $(target) 2>&1 1>&3-) ;} 3>&1
        final_status=$(<./build/status.txt)
        echo "FINAL STATUS  = ${final_status}"
        echo "POSSIBLE ERRORS: ${output}"
        
        if [ $final_status != "0" ]; then
          echo "Build & Testing Failed! \n ${output}" >&2
        fi
      failOnStderr: true
  - task: Bash@3
    condition: always()
    displayName: Cleanup
    inputs:
      targetType: 'inline'
      script: |
        rm -rf ./build/status.txt
  - task: PublishTestResults@2
    condition: always()
    displayName: Publish Test Report
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(Agent.BuildDirectory)/s/build/reports/*'
      failTaskOnFailedTests: true
      testRunTitle: 'Test Run - $(target)'
  
